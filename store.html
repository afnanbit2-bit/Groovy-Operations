<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Groovy Store</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#1A1A2E;--red:#E94560;--bg:#F2F2F4;--surface:#fff;--border:#E5E5E7;--text:#1A1A2E;--muted:#6B7280;--green:#1D9E75;--amber:#EF9F27;--sidebar:220px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}

/* ── Login ── */
#scr-login{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--dark)}
.login-box{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;margin:1rem}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo .l1{font-size:22px;font-weight:700;color:var(--dark)}
.login-logo .l2{font-size:12px;color:var(--muted);margin-top:2px}
.login-box input{display:block;width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:9px;font-size:14px;margin-bottom:10px;background:#FAFAFA;color:var(--text);font-family:inherit;outline:none}
.login-box input:focus{border-color:var(--red)}
.btn-login{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-back{display:block;text-align:center;margin-top:10px;font-size:12px;color:var(--muted);text-decoration:none}
.login-back:hover{color:var(--text)}

/* ── App shell ── */
#scr-app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--dark);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-logo{font-size:15px;font-weight:700;color:#fff;flex:1}
.topbar-logo span{color:var(--red)}
.topbar-user{font-size:12px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:8px}
.topbar-name{color:#fff;font-weight:600}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-logout:hover{border-color:rgba(255,255,255,.5);color:#fff}
.app-body{display:flex;flex:1;min-height:0}
#sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);flex-shrink:0;padding:12px 8px;overflow-y:auto}
.nav-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);font-weight:500;margin-bottom:2px;transition:all .12s}
.nav-item:hover{background:#F4F4F6;color:var(--text)}
.nav-item.on{background:var(--dark);color:#fff}
.nav-divider{height:1px;background:var(--border);margin:8px 4px}
#main-content{flex:1;overflow-y:auto;padding:18px 16px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.page-head{margin-bottom:16px}
.page-title{font-size:18px;font-weight:700}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;margin-top:4px}

/* ── Forms ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--muted)}
.field input,.field select,.field textarea{padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#FAFAFA;color:var(--text);font-family:inherit;outline:none;width:100%;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);background:#fff}
.field input[readonly]{background:#f0f0f0;cursor:default}

/* ── Buttons ── */
.btn-primary{display:block;width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-outline{padding:8px 14px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text)}
.btn-outline:hover{border-color:var(--dark);color:var(--dark)}
.btn-sm{padding:5px 10px;background:var(--dark);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.btn-sm:hover{opacity:.85}
.btn-danger{padding:5px 10px;background:none;border:1px solid #fca5a5;color:#dc2626;font-size:11px;cursor:pointer;font-family:inherit;border-radius:6px}
.btn-danger:hover{background:#fee2e2}
.btn-green{padding:5px 10px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}

/* ── Inventory item cards ── */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:16px}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.item-card.status-red{border-left:3px solid #dc2626}
.item-card.status-amber{border-left:3px solid var(--amber)}
.item-card.status-green{border-left:3px solid var(--green)}
.item-code{font-size:10px;font-weight:700;color:var(--red);letter-spacing:.05em;text-transform:uppercase}
.item-name{font-size:13px;font-weight:600;margin-top:2px;line-height:1.3}
.item-bal{font-size:22px;font-weight:700;margin-top:8px}
.item-bal.red{color:#dc2626}
.item-bal.amber{color:var(--amber)}
.item-bal.green{color:var(--green)}
.item-sizes{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.9}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-green{background:#dcfce7;color:#14532d}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}

/* ── Size input grid ── */
.size-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.size-field{display:flex;flex-direction:column;gap:3px;min-width:60px;flex:1;max-width:90px}
.size-field label{font-size:10px;font-weight:600;color:var(--muted);text-align:center}
.size-field input{padding:7px 6px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:#FAFAFA;color:var(--text);font-family:inherit;outline:none;text-align:center;width:100%}
.size-field input:focus{border-color:var(--red)}
.size-field .stk{font-size:9px;color:var(--muted);text-align:center}

/* ── Transaction rows ── */
.tx-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5;gap:10px}
.tx-row:last-child{border-bottom:none}

/* ── Request cards ── */
.req-card{background:#f8f8f8;border-radius:8px;padding:12px;margin-bottom:8px}
.req-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}

/* ── Issue items table ── */
.issue-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;gap:8px;font-size:13px}
.issue-row:last-child{border-bottom:none}
.stock-ok{color:var(--green);font-weight:600}
.stock-low{color:#dc2626;font-weight:600}

/* ── Template item row ── */
.tpl-item-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;flex-wrap:wrap;padding:8px;background:#f8f8f8;border-radius:8px}

/* ── Alert banner ── */
.alert-banner{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.alert-red{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert-amber{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.alert-green{background:#dcfce7;color:#14532d;border:1px solid #86efac}

/* ── Misc ── */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#dc2626}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;color:var(--muted);font-weight:500}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:600px){
  #sidebar{display:none}
  .form-grid{grid-template-columns:1fr}
  .app-body{flex-direction:column}
  #main-content{padding:12px}
  #mob-nav{display:flex !important}
  .item-grid{grid-template-columns:1fr 1fr}
}
#mob-nav{display:none;background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;padding:6px 0}
.mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 4px;font-size:10px;color:var(--muted);cursor:pointer;font-weight:500;gap:2px}
.mob-nav-item.on{color:var(--red)}
</style>

// ── Firestore REST value converters ──
function fsVal(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number')return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(typeof v==='string')return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(fsVal)}};
  if(typeof v==='object')return{mapValue:{fields:toFsFields(v)}};
  return{nullValue:null};
}
function toFsFields(obj){
  const f={};
  for(const[k,v]of Object.entries(obj))f[k]=fsVal(v);
  return f;
}
function fromFsVal(v){
  if('nullValue'in v)return null;
  if('booleanValue'in v)return v.booleanValue;
  if('integerValue'in v)return parseInt(v.integerValue);
  if('doubleValue'in v)return v.doubleValue;
  if('stringValue'in v)return v.stringValue;
  if('arrayValue'in v)return(v.arrayValue.values||[]).map(fromFsVal);
  if('mapValue'in v)return fromFsDoc({fields:v.mapValue.fields||{}});
  return null;
}
function fromFsDoc(doc){
  const obj={};
  if(!doc||!doc.fields)return obj;
  for(const[k,v]of Object.entries(doc.fields))obj[k]=fromFsVal(v);
  if(doc.name)obj._id=doc.name.split('/').pop();
  return obj;
}

// ── Token management ──
async function getToken(){
  if(idToken&&Date.now()<tokenExpiry-60000)return idToken;
  const rt=sessionStorage.getItem('st_rt');
  if(!rt)throw new Error('Not authenticated');
  const r=await fetch(`${TOKEN_URL}?key=${API_KEY}`,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=refresh_token&refresh_token=${encodeURIComponent(rt)}`
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||'Token refresh failed');
  idToken=d.id_token;
  tokenExpiry=Date.now()+parseInt(d.expires_in)*1000;
  sessionStorage.setItem('st_rt',d.refresh_token);
  return idToken;
}

// ── Firestore REST operations ──
async function fsList(col,pageSize=300){
  const tok=await getToken();
  const r=await fetch(`${FS}/${col}?pageSize=${pageSize}`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json();
  return(d.documents||[]).map(fromFsDoc);
}
async function fsSet(col,id,data){
  const tok=await getToken();
  const r=await fetch(`${FS}/${col}/${encodeURIComponent(id)}`,{
    method:'PATCH',
    headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},
    body:JSON.stringify({fields:toFsFields(data)})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Write failed');}
  return true;
}
async function fsAdd(col,data){
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  await fsSet(col,id,data);
  return id;
}
async function fsDelete(col,id){
  const tok=await getToken();
  await fetch(`${FS}/${col}/${encodeURIComponent(id)}`,{method:'DELETE',headers:{Authorization:`Bearer ${tok}`}});
}
async function fsQueryWhere(col,field,value,limit=50){
  const tok=await getToken();
  const r=await fetch(`${FS}:runQuery`,{
    method:'POST',
    headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},
    body:JSON.stringify({structuredQuery:{
      from:[{collectionId:col}],
      where:{fieldFilter:{field:{fieldPath:field},op:'EQUAL',value:fsVal(value)}},
      limit
    }})
  });
  const docs=await r.json();
  return(Array.isArray(docs)?docs:[]).filter(d=>d.document).map(d=>fromFsDoc(d.document));
}
async function fsQueryOrdered(col,orderField,limit=100){
  const tok=await getToken();
  const r=await fetch(`${FS}:runQuery`,{
    method:'POST',
    headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},
    body:JSON.stringify({structuredQuery:{
      from:[{collectionId:col}],
      orderBy:[{field:{fieldPath:orderField},direction:'DESCENDING'}],
      limit
    }})
  });
  const docs=await r.json();
  return(Array.isArray(docs)?docs:[]).filter(d=>d.document).map(d=>fromFsDoc(d.document));
}

// ── Auth ──
window.doLogin=async function(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const def=USER_DEFS.find(x=>x.u===u);
  if(!def){showToast('Username not found.',true);return;}
  if(def.role==='worker'){showToast('Workers use the Operations app.',true);return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    const r=await fetch(`${AUTH_URL}:signInWithPassword?key=${API_KEY}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:def.email,password:p,returnSecureToken:true})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||'Sign-in failed');
    idToken=d.idToken;
    tokenExpiry=Date.now()+parseInt(d.expiresIn)*1000;
    sessionStorage.setItem('st_rt',d.refreshToken);
    sessionStorage.setItem('st_u',def.u);
    session={...def};
    startApp();
  }catch(e){
    const msg=e.message.includes('INVALID_LOGIN_CREDENTIALS')||e.message.includes('INVALID_PASSWORD')?'Wrong password. Try again.':'Error: '+e.message;
    showToast(msg,true);
    btn.disabled=false;btn.textContent='Sign in';
  }
};

window.doLogout=function(){
  sessionStorage.removeItem('st_rt');
  sessionStorage.removeItem('st_u');
  location.reload();
};

// ── Session restore ──
async function tryRestoreSession(){
  const u=sessionStorage.getItem('st_u');
  const rt=sessionStorage.getItem('st_rt');
  if(!u||!rt)return false;
  const def=USER_DEFS.find(x=>x.u===u);
  if(!def||def.role==='worker')return false;
  try{
    const r=await fetch(`${TOKEN_URL}?key=${API_KEY}`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`grant_type=refresh_token&refresh_token=${encodeURIComponent(rt)}`
    });
    const d=await r.json();
    if(d.error)return false;
    idToken=d.id_token;
    tokenExpiry=Date.now()+parseInt(d.expires_in)*1000;
    sessionStorage.setItem('st_rt',d.refresh_token);
    session={...def};
    return true;
  }catch{return false;}
}

async function startApp(){

function buildNav(){

function showSection(id){

  document.getElementById('nav-'+id)?.classList.add('on');
  document.getElementById('mobnav-'+id)?.classList.add('on');

}

async function loadAllData(){
  try{
    const[items,txns,templates,requests]=await Promise.all([
      fsList('store_items'),
      fsQueryOrdered('store_transactions','ts',100),
      fsList('trim_templates'),
      fsList('store_requests'),
    ]);
    allItems=items;
    allTransactions=txns;
    allTemplates=templates;
    allRequests=requests;
    if(!allItems.length)await preloadItems();
  }catch(e){showToast('Load error: '+e.message,true);}
}

async function preloadItems(){
  showToast('Initialising store items…');
  await Promise.all(INITIAL_ITEMS.map(item=>fsSet('store_items',item.code,item).catch(()=>{})));
  allItems=INITIAL_ITEMS.map(i=>({...i,_id:i.code}));
  showToast('Store initialised ✓');
}

// ── Balance helpers ──
function getBalance(item){
  if(item.sizeSpecific)return Object.values(item.sizes||{}).reduce((s,v)=>s+(parseInt(v)||0),0);
  return parseInt(item.balance)||0;
}
function getStatus(item){
  const b=getBalance(item);
  if(b<=0)return'red';
  if(b<(item.lowStockThreshold||500))return'amber';
  return'green';
}
function formatSizes(item){
  return Object.entries(item.sizes||{}).map(([k,v])=>`${k}: ${v}`).join(' · ');
}
function todayStr(){return new Date().toISOString().split('T')[0];}
function tsLabel(ts){return ts?new Date(ts).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';}
function safeId(str){return(str||'').replace(/[^a-zA-Z0-9]/g,'_');}

// ── Init ──
(async()=>{
  const ok=await tryRestoreSession();
  if(ok){await startApp();}
  else{document.getElementById('scr-login').style.display='flex';}
})();
// ── Section router ──
function renderSection(id){
  const m=document.getElementById('main-content');
  if(id==='inventory'){m.innerHTML=renderInventory();}
  else if(id==='receive'){m.innerHTML=renderReceive();onRcvItemChange();}
  else if(id==='issue'){m.innerHTML=renderIssue();onIssItemChange();loadActivePOs();}
  else if(id==='templates'){m.innerHTML=renderTemplates();}
  else if(id==='transactions'){m.innerHTML=renderTransactions();}
  else if(id==='dashboard'){m.innerHTML=renderDashboard();}
}

      <div class="card-title">⚠ Low / Out of Stock (${lowStock.length} items)</div>

function onRcvItemChange(){
  const code=document.getElementById('rcv-item')?.value;
  const item=allItems.find(i=>i.code===code);
  if(!item)return;
  const wrap=document.getElementById('rcv-qty-wrap');
  if(!wrap)return;
  if(item.sizeSpecific){
    wrap.innerHTML=`<div class="field"><label>Qty received per size (${item.unit})</label>
      <div class="size-grid">${Object.keys(item.sizes||{}).map(sz=>`<div class="size-field">
        <label>${sz}</label>

      </div>`).join('')}</div></div>`;
  }else{
    const b=getBalance(item);
    wrap.innerHTML=`<div class="field"><label>Qty received (${item.unit}) · Current stock: ${b}</label>
      <input type="number" id="rcv-flat" min="0" placeholder="0"></div>`;
  }
}

async function submitReceive(){
  const code=document.getElementById('rcv-item')?.value;
  const item=allItems.find(i=>i.code===code);
  if(!item){showToast('Select an item.',true);return;}
  const supplier=(document.getElementById('rcv-supplier')?.value||'').trim();
  const date=document.getElementById('rcv-date')?.value||todayStr();
  const notes=(document.getElementById('rcv-notes')?.value||'').trim();
  const updated={...item};
  let totalQty=0;
  if(item.sizeSpecific){
    const newSizes={...item.sizes};
    let any=false;
    for(const sz of Object.keys(item.sizes||{})){
      const v=parseFloat(document.getElementById('rcv-'+safeId(sz))?.value)||0;
      if(v){newSizes[sz]=(parseInt(newSizes[sz])||0)+v;any=true;totalQty+=v;}
    }
    if(!any){showToast('Enter qty for at least one size.',true);return;}
    updated.sizes=newSizes;
  }else{
    const v=parseFloat(document.getElementById('rcv-flat')?.value)||0;
    if(!v){showToast('Enter quantity received.',true);return;}
    updated.balance=(parseInt(item.balance)||0)+v;
    totalQty=v;
  }
  try{
    await fsSet('store_items',item.code,updated);
    const txId=await fsAdd('store_transactions',{
      type:'received',itemCode:item.code,itemName:item.name,
      supplier,date,notes,by:session.name,ts:Date.now(),
      qty:totalQty,unit:item.unit,
    });
    const idx=allItems.findIndex(i=>i.code===code);
    if(idx>=0)allItems[idx]={...updated,_id:item.code};
    allTransactions.unshift({type:'received',itemCode:item.code,itemName:item.name,supplier,date,notes,by:session.name,ts:Date.now(),qty:totalQty,unit:item.unit,_id:txId});
    showToast('Stock received ✓');
    renderSection('receive');
  }catch(e){showToast('Error: '+e.message,true);}
}

function filterPODropMain(val){
  const dd=document.getElementById('iss-po-drop-main');if(!dd)return;
  const q=normPO(val);
  const matches=allActivePOs.filter(p=>normPO(p.id).includes(q)||(p.name||'').toLowerCase().includes(q));
  if(!matches.length||!val){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=matches.slice(0,10).map(p=>`<div onclick="selectPOMain('${p.id}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:13px" onmouseenter="this.style.background='#f5f5f5'" onmouseleave="this.style.background=''">
    <span style="font-weight:700;color:var(--red)">${p.id}</span>
    <span style="color:var(--muted);margin-left:6px;font-size:12px">${p.name||'—'} · ${p.currentStage||'—'}</span>
  </div>`).join('');
}
function hidePODropMain(){const dd=document.getElementById('iss-po-drop-main');if(dd)dd.style.display='none';}
function selectPOMain(poId){
  const inp=document.getElementById('iss-po');if(inp)inp.value=poId;
  hidePODropMain();
  const normalized=poId.trim().toUpperCase().replace(/^PO[\s\-]?0*(\d+)$/,'PO-$1');
  onIssPoInput(normalized);
}

async function onIssPoInput(raw){
  const normalized=raw.trim().toUpperCase().replace(/^PO[\s\-]?0*(\d+)$/,'PO-$1').replace(/^0*(\d+)$/,'PO-$1')||raw.trim().toUpperCase();
  const poNum=normalized;
  const statusEl=document.getElementById('iss-po-status');
  const bodyEl=document.getElementById('iss-po-body');
  _poIssueData=null;
  if(!raw.trim()){statusEl.innerHTML='';bodyEl.innerHTML='';return;}
  statusEl.innerHTML='<span class="spinner" style="border-color:rgba(0,0,0,.2);border-top-color:var(--dark)"></span>';
  try{
    const matches=await fsQueryWhere('pos','id',poNum,1);
    if(!matches.length){statusEl.innerHTML='<span style="color:var(--muted)">PO not found</span>';bodyEl.innerHTML='';return;}
    const po=matches[0];
    statusEl.innerHTML=`<span style="color:var(--green);font-weight:600">✓ ${po.name||po.id} · ${po.qty||0} pcs</span>`;
    // Match trim template by product name substring
    const tpl=allTemplates.find(t=>t.productType&&po.name&&po.name.toLowerCase().includes(t.productType.toLowerCase()));
    if(!tpl||!tpl.items?.length){
      bodyEl.innerHTML=`<div class="alert-banner alert-amber">No trim template found for this product. Use manual issue below or create a template first.</div>`;
      return;
    }
    _poIssueData={po,tpl};
    renderPoIssueBody(po,tpl);
  }catch(e){statusEl.innerHTML=`<span style="color:#dc2626">Error: ${e.message}</span>`;}
}

function renderPoIssueBody(po,tpl){
  const qty=parseInt(po.qty)||1;
  const bodyEl=document.getElementById('iss-po-body');
  let rows='';
  for(const req of tpl.items){
    const item=allItems.find(i=>i.code===req.itemCode);
    if(!item)continue;
    const needed=req.calcType==='per_unit_flat'?(qty*(parseFloat(req.qtyPerUnit)||1)):qty;
    const bal=getBalance(item);
    const ok=bal>=needed;
    rows+=`<div class="issue-row">
      <div style="flex:1;min-width:0">
        <div><strong>${item.code}</strong> — ${item.name}</div>
        <div style="font-size:11px;color:var(--muted)">Need: ${needed} ${item.unit} · Stock: <span class="${ok?'stock-ok':'stock-low'}">${bal}</span></div>
      </div>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;flex-shrink:0">
        <input type="checkbox" id="iss-chk-${safeId(item.code)}" ${ok?'checked':''} ${ok?'':'disabled'}>
        Issue
      </label>
    </div>`;
  }
  bodyEl.innerHTML=rows
    +`<button class="btn-primary" style="margin-top:10px" onclick="submitPoIssue()">Confirm issue for ${po.id}</button>`;
}

async function submitPoIssue(){
  if(!_poIssueData){showToast('No PO loaded.',true);return;}
  const{po,tpl}=_poIssueData;
  const qty=parseInt(po.qty)||1;
  const toIssue=tpl.items.filter(req=>document.getElementById('iss-chk-'+safeId(req.itemCode))?.checked);
  if(!toIssue.length){showToast('No items selected.',true);return;}
  try{
    for(const req of toIssue){
      const item=allItems.find(i=>i.code===req.itemCode);
      if(!item)continue;
      const needed=req.calcType==='per_unit_flat'?(qty*(parseFloat(req.qtyPerUnit)||1)):qty;
      const updated={...item};
      if(item.sizeSpecific){
        const szKeys=Object.keys(item.sizes||{});
        const perSz=Math.floor(needed/szKeys.length);
        const newSizes={...item.sizes};
        for(const sz of szKeys)newSizes[sz]=Math.max(0,(parseInt(newSizes[sz])||0)-perSz);
        updated.sizes=newSizes;
      }else{
        updated.balance=Math.max(0,(parseInt(item.balance)||0)-needed);
      }
      await fsSet('store_items',item.code,updated);
      await fsAdd('store_transactions',{type:'issued',itemCode:item.code,itemName:item.name,
        issuedTo:'Production',purpose:`PO ${po.id}`,date:todayStr(),
        by:session.name,ts:Date.now(),qty:needed,unit:item.unit,poId:po.id});
      const idx=allItems.findIndex(i=>i.code===item.code);
      if(idx>=0)allItems[idx]={...updated,_id:item.code};
    }
    showToast(`Items issued for ${po.id} ✓`);
    _poIssueData=null;
    document.getElementById('iss-po').value='';
    document.getElementById('iss-po-status').innerHTML='';
    document.getElementById('iss-po-body').innerHTML='';
  }catch(e){showToast('Error: '+e.message,true);}
}

function onIssItemChange(){
  const code=document.getElementById('iss-item')?.value;
  const item=allItems.find(i=>i.code===code);
  const wrap=document.getElementById('iss-qty-wrap');
  if(!item||!wrap)return;
  if(item.sizeSpecific){
    wrap.innerHTML=`<div class="field"><label>Qty to issue per size (${item.unit})</label>
      <div class="size-grid">${Object.keys(item.sizes||{}).map(sz=>`<div class="size-field">
        <label>${sz}</label>
        <input type="number" min="0" placeholder="0" id="iss-${safeId(sz)}">
        <div class="stk">Stk: ${item.sizes[sz]||0}</div>
      </div>`).join('')}</div></div>`;
  }else{
    const b=getBalance(item);
    wrap.innerHTML=`<div class="field"><label>Qty to issue (${item.unit}) · Stock: ${b}</label>
      <input type="number" id="iss-flat" min="0" max="${b}" placeholder="0"></div>`;
  }
}

async function loadActivePOs(){
  try{
    const snap=await fsList('pos',200);
    allActivePOs=snap.filter(p=>p.currentStage&&p.currentStage!=='completed').sort((a,b)=>b.ts-a.ts);
  }catch(e){}
}

function normPO(s){return s.replace(/[\s\-]/g,'').toLowerCase();}

function filterPODrop(val){
  const dd=document.getElementById('iss-po-drop');if(!dd)return;
  const q=normPO(val);
  const matches=allActivePOs.filter(p=>normPO(p.id).includes(q)||(p.name||'').toLowerCase().includes(q));
  if(!matches.length||!val){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=matches.slice(0,10).map(p=>`<div onclick="selectPO('${p.id}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:13px" onmouseenter="this.style.background='#f5f5f5'" onmouseleave="this.style.background=''">
    <span style="font-weight:700;color:var(--red)">${p.id}</span>
    <span style="color:var(--muted);margin-left:6px;font-size:12px">${p.name||'—'} · ${p.currentStage||'—'}</span>
  </div>`).join('');
}

function hidePODrop(){const dd=document.getElementById('iss-po-drop');if(dd)dd.style.display='none';}

function selectPO(poId){
  const inp=document.getElementById('iss-po-ref');
  if(inp){inp.value=poId;}
  hidePODrop();
  lookupManualPO(poId);
}

async function lookupManualPO(raw){
  const el=document.getElementById('iss-po-preview');
  if(!el)return;
  const q=normPO(raw);
  if(!q){el.innerHTML='';return;}
  // Normalize input: po007 → PO-007, PO007 → PO-007
  const normalized=raw.trim().toUpperCase().replace(/^PO[\s\-]?0*(\d+)$/,'PO-$1').replace(/^0*(\d+)$/,'PO-$1');
  el.innerHTML='<span style="font-size:12px;color:var(--muted)">Looking up…</span>';
  try{
    // Try local cache first (fuzzy), fallback to Firestore
    let po=allActivePOs.find(p=>normPO(p.id)===q||normPO(p.id)===normPO(normalized));
    if(!po){
      const matches=await fsQueryWhere('pos','id',normalized,1);
      if(!matches.length){el.innerHTML='<span style="font-size:12px;color:#dc2626">PO not found</span>';return;}
      po=matches[0];
    }
    const szs=['XS','S','M','L','XL','2XL'];
    const hasCut=po.cutQty&&szs.some(s=>po.cutQty[s]>0);
    const hasSizes=po.sizes&&szs.some(s=>po.sizes[s]>0);
    const stageLabel=po.currentStage?po.currentStage.charAt(0).toUpperCase()+po.currentStage.slice(1):'—';
    el.innerHTML=`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:12px 14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px">
        <span style="font-weight:700;color:var(--green);font-size:13px">✓ ${po.name||po.id}</span>
        <span style="font-size:11px;background:#1D9E7520;color:#1D9E75;padding:2px 8px;border-radius:10px;font-weight:600">${stageLabel}</span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${po.qty||0} pcs total · ${po.fabric||'—'}</div>
      ${hasCut?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Cut Qty</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${szs.filter(s=>po.cutQty[s]>0).map(s=>`<div style="text-align:center;min-width:38px;padding:5px 8px;background:#fff;border-radius:6px;border:1px solid #86efac"><div style="font-size:9px;color:var(--muted)">${s}</div><div style="font-size:14px;font-weight:700;color:var(--dark)">${po.cutQty[s]}</div></div>`).join('')}</div>
      </div>`:''}
      ${hasSizes&&!hasCut?`<div><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Order Qty (not yet cut)</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${szs.filter(s=>po.sizes[s]>0).map(s=>`<div style="text-align:center;min-width:38px;padding:5px 8px;background:#fff;border-radius:6px;border:1px solid #d1d5db"><div style="font-size:9px;color:var(--muted)">${s}</div><div style="font-size:14px;font-weight:700;color:var(--muted)">${po.sizes[s]}</div></div>`).join('')}</div>
      </div>`:''}
      ${!hasCut&&!hasSizes?`<div style="font-size:12px;color:var(--muted)">No size/cut data available yet.</div>`:''}
    </div>`;
  }catch(e){el.innerHTML=`<span style="font-size:12px;color:#dc2626">Error: ${e.message}</span>`;}
}

async function submitIssueManual(){
  const code=document.getElementById('iss-item')?.value;
  const item=allItems.find(i=>i.code===code);
  if(!item){showToast('Select an item.',true);return;}
  const poRefRaw=(document.getElementById('iss-po-ref')?.value||'').trim().toUpperCase();
  const poRef=poRefRaw.replace(/^PO[\s\-]?0*(\d+)$/,'PO-$1').replace(/^0*(\d+)$/,'PO-$1')||poRefRaw;
  if(!poRef){showToast('PO Number is required.',true);document.getElementById('iss-po-ref')?.focus();return;}
  const issuedTo=(document.getElementById('iss-to')?.value||'').trim();
  const purpose=(document.getElementById('iss-purpose')?.value||'').trim();
  const date=document.getElementById('iss-date')?.value||todayStr();
  const updated={...item};
  let totalQty=0;
  if(item.sizeSpecific){
    const newSizes={...item.sizes};
    let any=false;
    for(const sz of Object.keys(item.sizes||{})){
      const v=parseFloat(document.getElementById('iss-'+safeId(sz))?.value)||0;
      if(v){
        if(v>(parseInt(newSizes[sz])||0)){showToast(`Not enough stock for size ${sz}.`,true);return;}
        newSizes[sz]=Math.max(0,(parseInt(newSizes[sz])||0)-v);
        any=true;totalQty+=v;
      }
    }
    if(!any){showToast('Enter qty for at least one size.',true);return;}
    updated.sizes=newSizes;
  }else{
    const v=parseFloat(document.getElementById('iss-flat')?.value)||0;
    if(!v){showToast('Enter quantity.',true);return;}
    if(v>getBalance(item)){showToast('Insufficient stock.',true);return;}
    updated.balance=Math.max(0,(parseInt(item.balance)||0)-v);
    totalQty=v;
  }
  try{
    await fsSet('store_items',item.code,updated);
    const txData={type:'issued',itemCode:item.code,itemName:item.name,issuedTo,purpose,date,by:session.name,ts:Date.now(),qty:totalQty,unit:item.unit};
    txData.poRef=poRef;
    const txId=await fsAdd('store_transactions',txData);
    const idx=allItems.findIndex(i=>i.code===code);
    if(idx>=0)allItems[idx]={...updated,_id:item.code};
    allTransactions.unshift({...txData,_id:txId});
    showToast('Stock issued ✓');
    renderSection('issue');
  }catch(e){showToast('Error: '+e.message,true);}
}
// ══════════════════════════════════════════
// SECTION 4 — TRIM TEMPLATES
// ══════════════════════════════════════════
let _tplRowIdx=0;

function renderTemplates(){
  const isOwnerMgr=session.role==='owner'||session.role==='manager';
  if(!isOwnerMgr)return'<div class="empty">Owners and managers only.</div>';
  const opts=allItems.map(i=>`<option value="${i.code}">${i.code} — ${i.name}</option>`).join('');
  return`<div class="page-head"><div class="page-title">Trim Templates</div><div class="page-sub">Define required trims per product type</div></div>
  <div class="card">
    <div class="card-title">Create template</div>
    <div class="form-grid">
      <div class="field" style="grid-column:1/-1"><label>Product Type Name *</label>
        <input id="tpl-name" placeholder="e.g. Terry Oversized Tee, Denim Cargo Pant">
      </div>
    </div>
    <div style="margin-top:12px">
      <div class="section-title">Trim requirements</div>
      <div id="tpl-rows"></div>
      <button class="btn-outline" style="width:100%;margin-top:6px" onclick="addTplRow()">+ Add trim item</button>
    </div>
    <button class="btn-primary" style="margin-top:10px" onclick="submitTemplate()">Save Template</button>
  </div>
  ${allTemplates.length?`<div class="card">
    <div class="card-title">Saved templates (${allTemplates.length})</div>
    ${allTemplates.map(t=>`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${t.productType||'—'}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${(t.items||[]).map(i=>i.itemCode).join(' · ')||'No items'}</div>
      </div>
      <button class="btn-danger" onclick="deleteTemplate('${t._id}')">Delete</button>
    </div>`).join('')}
  </div>`:''}
  <div style="height:80px"></div>`;
}

function addTplRow(){
  _tplRowIdx++;
  const rowId='tpl-row-'+_tplRowIdx;
  const opts=allItems.map(i=>`<option value="${i.code}">${i.code} — ${i.name}</option>`).join('');
  const div=document.createElement('div');
  div.id=rowId;div.className='tpl-item-row';
  div.innerHTML=`
    <div class="field" style="flex:2;min-width:150px"><label>Item</label>
      <select>${opts}</select></div>
    <div class="field" style="flex:1;min-width:120px"><label>Calc type</label>
      <select>
        <option value="per_unit_flat">Per unit (flat)</option>
        <option value="size_specific">1 per piece per size</option>
        <option value="per_unit_measure">Per unit (measure)</option>
      </select></div>
    <div class="field" style="width:72px"><label>Qty/unit</label>
      <input type="number" min="0" step="0.01" value="1"></div>
    <button onclick="document.getElementById('${rowId}').remove()"
      style="background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;align-self:flex-end;padding:0 4px;margin-bottom:2px">×</button>`;
  document.getElementById('tpl-rows')?.appendChild(div);
}

async function submitTemplate(){
  const productType=(document.getElementById('tpl-name')?.value||'').trim();
  if(!productType){showToast('Product type name required.',true);return;}
  const rows=document.querySelectorAll('#tpl-rows .tpl-item-row');
  if(!rows.length){showToast('Add at least one trim item.',true);return;}
  const items=[];
  rows.forEach(row=>{
    const [itemSel,calcSel]=row.querySelectorAll('select');
    const qtyInp=row.querySelector('input[type=number]');
    if(itemSel?.value)items.push({itemCode:itemSel.value,calcType:calcSel?.value||'per_unit_flat',qtyPerUnit:parseFloat(qtyInp?.value)||1});
  });
  try{
    const id=await fsAdd('trim_templates',{productType,items,createdBy:session.name,createdAt:Date.now()});
    allTemplates.push({productType,items,createdBy:session.name,createdAt:Date.now(),_id:id});
    showToast('Template saved ✓');
    _tplRowIdx=0;
    renderSection('templates');
  }catch(e){showToast('Error: '+e.message,true);}
}

async function deleteTemplate(id){
  if(!confirm('Delete this template? This cannot be undone.'))return;
  try{
    await fsDelete('trim_templates',id);
    allTemplates=allTemplates.filter(t=>t._id!==id);
    showToast('Template deleted');
    renderSection('templates');
  }catch(e){showToast('Error: '+e.message,true);}
}

// ══════════════════════════════════════════
// SECTION 5 — TRANSACTION LOG
// ══════════════════════════════════════════
function renderTransactions(){
  return`<div class="page-head"><div class="page-title">Transaction Log</div><div class="page-sub">Last ${allTransactions.length} movements</div></div>
  <div class="card">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <input placeholder="Filter by item code or name…" oninput="filterTx(this.value,'type')"
        style="flex:1;min-width:140px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;outline:none">
      <select onchange="filterTx('','type',this.value)"
        style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;outline:none">
        <option value="">All types</option>
        <option value="received">Received</option>
        <option value="issued">Issued</option>
      </select>
    </div>
    <div id="tx-list">${txRows(allTransactions)}</div>
  </div>
  <div style="height:80px"></div>`;
}

function txRows(list){
  if(!list.length)return'<div class="empty">No transactions yet.</div>';
  return list.map(tx=>{
    const isRcv=tx.type==='received';
    return`<div class="tx-row">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:700;color:${isRcv?'var(--green)':'var(--red)'}">${isRcv?'▲ RECEIVED':'▼ ISSUED'}</span>
          <span style="font-size:11px;font-weight:700">${tx.itemCode||'—'}</span>
          ${tx.poId?`<span style="font-size:10px;background:#f0f0f0;padding:1px 6px;border-radius:8px">${tx.poId}</span>`:''}
        </div>
        <div style="font-size:13px;margin-top:2px">${tx.itemName||'—'}</div>
        <div style="font-size:11px;color:var(--muted)">${isRcv?`From: ${tx.supplier||'—'}`:`To: ${tx.issuedTo||'—'}`} ${tx.purpose?`· ${tx.purpose}`:''} ${tx.notes?`· ${tx.notes}`:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-weight:700">${tx.qty||0} <span style="font-size:11px;font-weight:400">${tx.unit||'pcs'}</span></div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${tx.date||''}</div>
        <div style="font-size:10px;color:var(--muted)">${tx.by||'—'}</div>
      </div>
    </div>`;
  }).join('');
}

let _txFilterQ='', _txFilterType='';
function filterTx(q,_,type){
  if(q!==undefined&&q!=='type')_txFilterQ=q;
  if(type!==undefined)_txFilterType=type;
  let list=allTransactions;
  if(_txFilterQ){const ql=_txFilterQ.toLowerCase();list=list.filter(t=>(t.itemCode||'').toLowerCase().includes(ql)||(t.itemName||'').toLowerCase().includes(ql));}
  if(_txFilterType)list=list.filter(t=>t.type===_txFilterType);
  document.getElementById('tx-list').innerHTML=txRows(list);
}

// ══════════════════════════════════════════
// RAEES DASHBOARD
// ══════════════════════════════════════════
function renderDashboard(){
  const lowStock=allItems.filter(i=>getStatus(i)!=='green');
  const pending=allRequests.filter(r=>r.status==='pending');
  const recent=allTransactions.slice(0,10);
  return`<div class="page-head"><div class="page-title">Store Dashboard</div><div class="page-sub">Welcome, ${session.name}</div></div>

  ${pending.length?`<div class="card" style="border-left:3px solid var(--red)">
    <div class="card-title">Pending Trim Requests (${pending.length})</div>
    ${pending.map(r=>`<div class="req-card">
      <div class="req-head">
        <div>
          <div style="font-weight:700;color:var(--red);font-size:13px">${r.poId||'—'}</div>
          <div style="font-size:11px;color:var(--muted)">${r.productType||'—'}</div>
        </div>
        <button class="btn-sm" onclick="showSection('issue')">Issue →</button>
      </div>
      <div style="font-size:11px;color:var(--muted)">${(r.requiredItems||[]).map(i=>`${i.itemCode}: ${i.quantity}`).join(' · ')||'—'}</div>
    </div>`).join('')}
  </div>`:`<div class="card">
    <div class="card-title">Pending Trim Requests</div>
    <div class="empty" style="padding:1rem">No pending requests.</div>
  </div>`}

  ${lowStock.length?`<div class="card" style="border-left:3px solid var(--amber)">
    <div class="card-title">⚠ Low / Out of Stock (${lowStock.length})</div>
    ${lowStock.slice(0,10).map(i=>`<div class="info-row">
      <span><strong>${i.code}</strong> — ${i.name}</span>
      <span class="badge badge-${getStatus(i)}">${getBalance(i)} ${i.unit}</span>
    </div>`).join('')}
    ${lowStock.length>10?`<div style="font-size:11px;color:var(--muted);padding-top:6px">+${lowStock.length-10} more items below threshold</div>`:''}
  </div>`:'<div class="alert-banner alert-green">All items are in stock ✓</div>'}

  <div class="card">
    <div class="card-title">Recent Activity (last 10)</div>
    ${recent.length?txRows(recent):'<div class="empty" style="padding:1rem">No transactions yet.</div>'}
  </div>
  <div style="height:80px"></div>`;
}
